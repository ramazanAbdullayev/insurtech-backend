spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5433/${POSTGRES_DB:insurtech-db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  cloud:
    aws:
      s3:
        bucket: dev-insurtech-claim-file-bucket
      region:
        static: eu-central-1
      credentials: # Specify only for local running to get access to AWS
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}

async:
  core-pool-size: 5
  max-pool-size: 10
  queue-capacity: 50

auth:
  task:
    refresh-token-clean-up: "0 0 2 1/7 * *"
  jwt:
    issuer: ${JWT_ISSUER}
    audience: ${JWT_AUDIENCE}
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL}
    refresh-token-ttl-days: ${REFRESH_TOKEN_TTL_DAYS}
    private-key-base64: ${JWT_PRIVATE_KEY}
    public-key-base64: ${JWT_PUBLIC_KEY}
  public-paths:
    - /insurtech/v1/auth/register
    - /insurtech/v1/auth/login
    - /insurtech/v1/auth/refresh
    - /swagger-ui/**
    - /v3/api-docs/**